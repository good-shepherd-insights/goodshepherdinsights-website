name: Require production branch for main PRs

on:
  pull_request:
    branches:
      - main

jobs:
  enforce-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless PR source is production
        run: |
          if [ "${{ github.head_ref }}" != "production" ]; then
            echo "Only PRs from 'production' into 'main' are allowed."
            exit 1
          fi
